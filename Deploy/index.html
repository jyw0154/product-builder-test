<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 루틴 대시보드 - Daily Habit & Routine Tracker</title>
    <!-- Google Fonts: Outfit, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables & Design System */
        :root {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --accent-primary: #4f46e5;
            --accent-primary-rgb: 79, 70, 229;
            --accent-secondary: #db2777;
            --success-color: #059669;
            --warning-color: #d97706;
            --streak-color: #ea580c;
            --shadow-color: rgba(15, 23, 42, 0.08);
            --shadow-glow: rgba(79, 70, 229, 0.2);
            --blur-strength: 16px;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 50%, #0c0f1d 100%);
            --card-bg: rgba(17, 24, 39, 0.65);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --accent-primary: #818cf8;
            --accent-primary-rgb: 129, 140, 248;
            --accent-secondary: #f472b6;
            --success-color: #34d399;
            --warning-color: #fbbf24;
            --streak-color: #fb923c;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-glow: rgba(129, 140, 248, 0.15);
            --blur-strength: 20px;
        }

        /* Basic Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            transition: background 0.5s ease, color 0.3s ease;
            overflow-x: hidden;
            position: relative;
        }

        /* Particles container for confetti and float animations */
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            z-index: 10;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* Premium Glass Card Layout */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px -5px var(--shadow-color);
            padding: 1.75rem;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .header-title {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .header-subtitle {
            font-size: 0.95rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Interactive Buttons */
        .btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: var(--border-radius-sm);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(var(--accent-primary-rgb), 0.3);
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(var(--accent-primary-rgb), 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(var(--accent-primary-rgb), 0.08);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(var(--accent-primary-rgb), 0.1);
        }

        .theme-toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
            font-size: 1.2rem;
            box-shadow: 0 4px 10px var(--shadow-color);
        }

        .theme-toggle-btn:hover {
            transform: rotate(15deg) scale(1.05);
            background: var(--text-primary);
            color: var(--card-bg);
        }

        /* Grid Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        /* Left Side: Stats and Info */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Profile & Level Card */
        .profile-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar-container {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 4px 15px var(--shadow-glow);
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .profile-title {
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .xp-section {
            background: rgba(0, 0, 0, 0.05);
            border-radius: var(--border-radius-sm);
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        [data-theme="dark"] .xp-section {
            background: rgba(255, 255, 255, 0.03);
        }

        .xp-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .xp-bar-bg {
            height: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        [data-theme="dark"] .xp-bar-bg {
            background: rgba(255, 255, 255, 0.1);
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            width: 30%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 5px;
        }

        /* Streak & Stat Badge Grid */
        .badge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-badge {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            text-align: center;
            transition: transform 0.2s ease;
        }
        [data-theme="dark"] .stat-badge {
            background: rgba(255, 255, 255, 0.02);
        }

        .stat-badge:hover {
            transform: scale(1.03);
        }

        .stat-icon {
            font-size: 1.6rem;
        }

        .stat-val {
            font-size: 1.3rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Today's Circle Progress Card */
        .progress-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-align: center;
        }

        .progress-circle-svg {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .progress-circle-bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.05);
            stroke-width: 12;
        }
        [data-theme="dark"] .progress-circle-bg {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .progress-circle-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-center-text {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .progress-percent {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-fraction {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-top: -2px;
        }

        /* Main Content: Routine Checklists */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Filters & Add Routine Bar */
        .routine-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.25rem;
            width: 100%;
        }

        @media (min-width: 600px) {
            .filter-tabs {
                width: auto;
            }
        }

        .filter-tab {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        [data-theme="dark"] .filter-tab {
            background: rgba(255, 255, 255, 0.02);
        }

        .filter-tab:hover {
            background: rgba(var(--accent-primary-rgb), 0.05);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 4px 10px rgba(var(--accent-primary-rgb), 0.2);
        }

        /* Routine List */
        .routine-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 200px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
            gap: 1rem;
            text-align: center;
            border: 2px dashed var(--card-border);
            border-radius: var(--border-radius-md);
        }

        .empty-icon {
            font-size: 3rem;
            animation: bounce 2s infinite;
        }

        /* Routine Card Item */
        .routine-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.4rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }
        [data-theme="dark"] .routine-item {
            background: rgba(255, 255, 255, 0.015);
        }

        .routine-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 20px -5px var(--shadow-color);
            border-color: rgba(var(--accent-primary-rgb), 0.3);
        }
        [data-theme="dark"] .routine-item:hover {
            background: rgba(255, 255, 255, 0.035);
        }

        .routine-item.completed {
            background: rgba(5, 150, 105, 0.05);
            border-color: rgba(5, 150, 105, 0.2);
        }
        [data-theme="dark"] .routine-item.completed {
            background: rgba(52, 211, 153, 0.03);
            border-color: rgba(52, 211, 153, 0.1);
        }

        .routine-info-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .routine-emoji {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] .routine-emoji {
            background: rgba(255, 255, 255, 0.05);
        }

        .routine-item.completed .routine-emoji {
            background: rgba(5, 150, 105, 0.15);
            transform: scale(0.95);
        }

        .routine-details {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .routine-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .routine-item.completed .routine-title {
            text-decoration: line-through;
            color: var(--text-tertiary);
        }

        .routine-meta-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .routine-time, .routine-frequency {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .routine-category-badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-morning { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .badge-afternoon { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge-evening { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
        .badge-health { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-custom { background: rgba(107, 114, 128, 0.15); color: #6b7280; }

        .routine-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Animated Checkbox */
        .check-container {
            position: relative;
            cursor: pointer;
            width: 28px;
            height: 28px;
            user-select: none;
        }

        .check-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: transparent;
            border: 2px solid var(--text-tertiary);
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .checkmark::after {
            content: "✓";
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            display: none;
        }

        .check-container input:checked ~ .checkmark {
            background-color: var(--success-color);
            border-color: var(--success-color);
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(52, 211, 153, 0.4);
        }

        .check-container input:checked ~ .checkmark::after {
            display: block;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .routine-item-edit-btn, .routine-item-del-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .routine-item-edit-btn:hover {
            color: var(--accent-primary);
            background: rgba(var(--accent-primary-rgb), 0.1);
        }

        .routine-item-del-btn:hover {
            color: var(--accent-secondary);
            background: rgba(219, 39, 119, 0.1);
        }

        /* Weekly custom SVG stats chart */
        .chart-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 1.5rem 0.5rem 0.5rem 0.5rem;
            border-bottom: 2px solid var(--card-border);
        }

        .chart-bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
            gap: 0.5rem;
            cursor: pointer;
            position: relative;
        }

        .chart-tooltip {
            position: absolute;
            bottom: 100%;
            background: var(--text-primary);
            color: var(--card-bg);
            padding: 0.25rem 0.5rem;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .chart-bar-group:hover .chart-tooltip {
            opacity: 1;
            transform: translateY(-5px);
        }

        .chart-bar-bg {
            width: 24px;
            height: 100%;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        [data-theme="dark"] .chart-bar-bg {
            background: rgba(255, 255, 255, 0.03);
        }

        .chart-bar-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .chart-bar-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }

        .chart-label {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        .chart-bar-group.today .chart-label {
            color: var(--accent-primary);
            font-weight: 800;
        }

        .chart-bar-group.today .chart-bar-bg {
            background: rgba(var(--accent-primary-rgb), 0.08);
            border: 1px solid rgba(var(--accent-primary-rgb), 0.2);
        }

        /* Modal Overlay & Card styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-lg);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px -10px var(--shadow-color);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--accent-secondary);
        }

        .modal-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-sm);
            padding: 0.75rem;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }
        [data-theme="dark"] .form-input {
            background: rgba(255, 255, 255, 0.05);
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(var(--accent-primary-rgb), 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Emoji selector */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .emoji-btn {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-sm);
            font-size: 1.5rem;
            padding: 0.5rem 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        [data-theme="dark"] .emoji-btn {
            background: rgba(255, 255, 255, 0.02);
        }

        .emoji-btn:hover {
            background: rgba(var(--accent-primary-rgb), 0.1);
            transform: scale(1.1);
        }

        .emoji-btn.selected {
            background: rgba(var(--accent-primary-rgb), 0.2);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 10px rgba(var(--accent-primary-rgb), 0.15);
        }

        /* Day selection checkboxes */
        .day-selection {
            display: flex;
            gap: 0.25rem;
            justify-content: space-between;
        }

        .day-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: center;
        }
        [data-theme="dark"] .day-btn {
            background: rgba(255, 255, 255, 0.02);
        }

        .day-btn.selected {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .modal-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* Level Up pop-up animation modal */
        .levelup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .levelup-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .levelup-content {
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            color: white;
        }

        .levelup-modal.active .levelup-content {
            transform: scale(1);
        }

        .levelup-badge {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            animation: pulse-glow 2s infinite, spin-y 4s infinite linear;
        }

        .levelup-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffd700, #ff8c00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .levelup-text {
            font-size: 1.3rem;
            color: #cbd5e1;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: var(--text-primary);
            color: var(--card-bg);
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-left: 5px solid var(--success-color);
        }

        .toast-xp {
            border-left: 5px solid var(--accent-primary);
        }

        /* Mock tool/developer utility drawer toggle button */
        .dev-drawer-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow-color);
            z-index: 99;
            transition: all 0.2s ease;
        }
        .dev-drawer-btn:hover {
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .dev-drawer {
            position: fixed;
            bottom: 70px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 1rem;
            width: 260px;
            box-shadow: 0 10px 30px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 99;
            transform: translateY(20px) scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .dev-drawer.active {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .dev-drawer-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.25rem;
        }

        /* CSS Animations */
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 45px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        }

        @keyframes spin-y {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .confetti-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: fall 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fall {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(0.2);
                opacity: 0;
            }
        }
    </style>
</head>

    <!-- Javascript Core Logic -->
    <script>
        // State management variables
        let routines = [];
        let completedLogs = {}; // Format: { "YYYY-MM-DD": [routineId1, routineId2] }
        let userStats = {
            streak: 0,
            bestStreak: 0,
            totalDone: 0,
            level: 1,
            xp: 0,
            lastDoneDate: null
        };
        
        let currentFilter = 'all';
        let selectedEmoji = '☀️';
        let customDays = [0, 1, 2, 3, 4, 5, 6]; // Default Sun-Sat

        // Dates mock manager to allow testing
        let customDateOffset = 0; // Number of days offset from today
        
        function getTodayString() {
            const today = new Date();
            today.setDate(today.getDate() + customDateOffset);
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getFormattedDateText() {
            const daysKor = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const date = new Date();
            date.setDate(date.getDate() + customDateOffset);
            
            const year = date.getFullYear();
            const month = date.getMonth() + 1;

        // Particle effect trigger

            const colors = ['#818cf8', '#f472b6', '#34d399', '#fbbf24', '#38bdf8', '#a78bfa'];
            const container = document.getElementById('particle-container');
            
            for (let i = 0; i < 30; i++) {

                particle.classList.add('confetti-particle');
                
                const size = Math.random() * 8 + 4;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Random destination coords
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 120 + 30;
                const destX = Math.cos(angle) * distance;
                const destY = Math.sin(angle) * distance;
                
                particle.style.setProperty('--x', `${destX}px`);
                particle.style.setProperty('--y', `${destY}px`);
                particle.style.setProperty('--rot', `${Math.random() * 360 + 360}deg`);
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                
                container.appendChild(particle);

        // Calculate and process user Level/XP system
        function addXP(amount) {
            userStats.xp += amount;
            const xpNeeded = getXPNeededForNextLevel(userStats.level);
            
            showToast(`습관 실천! +${amount} XP 획득`, 'xp');

            if (userStats.xp >= xpNeeded) {
                userStats.xp -= xpNeeded;
                userStats.level += 1;
                saveStats();
                triggerLevelUpAnimation(userStats.level);
            } else {
                saveStats();
            }
            
            updateHeaderAndProfile();
        }

        function getXPNeededForNextLevel(level) {
            return level * 100; // Formula: Level 1 requires 100XP, Level 2 requires 200XP ...
        }

        // Render custom bar SVG chart representing weekly performance
        function renderWeeklyChart() {
            const container = document.getElementById('weekly-chart-container');
            container.innerHTML = '';
            
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            
            // Calculate date limits for 7 days (including today as the last)
            const dates = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() + customDateOffset - i);
                dates.push({
                    dateStr: getFormattedDateString(d),
                    dayLabel: dayNames[d.getDay()],
                    isToday: i === 0,
                    rawDate: d
                });
            }

            // Find date range text
            const firstDate = dates[0].rawDate;
            const lastDate = dates[6].rawDate;
            document.getElementById('chart-week-range').innerText = 
                `${firstDate.getMonth()+1}/${firstDate.getDate()} ~ ${lastDate.getMonth()+1}/${lastDate.getDate()}`;

            // Calculate max value to scale chart (min max scale is 5)
            let maxCount = 3;
            const counts = dates.map(dayInfo => {
                const logs = completedLogs[dayInfo.dateStr] || [];
                // count how many matches in routines for that day
                const dayIndex = dayInfo.rawDate.getDay();
                const totalRoutinesForDay = routines.filter(r => r.days.includes(dayIndex));
                const completedRoutines = totalRoutinesForDay.filter(r => logs.includes(r.id)).length;
                if (completedRoutines > maxCount) maxCount = completedRoutines;
                return completedRoutines;
            });

            dates.forEach((dayInfo, idx) => {
                const count = counts[idx];
                const heightPercent = maxCount > 0 ? (count / maxCount) * 100 : 0;
                
                const group = document.createElement('div');
                group.className = `chart-bar-group ${dayInfo.isToday ? 'today' : ''}`;
                
                const tooltip = document.createElement('span');
                tooltip.className = 'chart-tooltip';
                tooltip.innerText = `${count}개 완료`;
                group.appendChild(tooltip);

                const barBg = document.createElement('div');
                barBg.className = 'chart-bar-bg';
                
                const barFill = document.createElement('div');
                barFill.className = 'chart-bar-fill';
                barFill.style.height = `${heightPercent}%`;
                
                barBg.appendChild(barFill);
                group.appendChild(barBg);

                const label = document.createElement('span');
                label.className = 'chart-label';
                label.innerText = dayInfo.dayLabel;
                group.appendChild(label);
                
                container.appendChild(group);
            });
        }

            return `${yyyy}-${mm}-${dd}`;

        // Toggle Check routine handler
        function toggleCheckRoutine(id, isChecked, event) {
            const today = getTodayString();
            if (!completedLogs[today]) {
                completedLogs[today] = [];
            }

            if (isChecked) {
                if (!completedLogs[today].includes(id)) {
                    completedLogs[today].push(id);
                    userStats.totalDone += 1;
                    
                    // Award XP (15XP per routine checked)
                    addXP(15);

                    // Confetti explosion
                    if (event) {
                        const rect = event.target.getBoundingClientRect();
                        createConfetti(rect.left + 14, rect.top + 14);
                    }
                }
            } else {
                completedLogs[today] = completedLogs[today].filter(item => item !== id);
                if (userStats.totalDone > 0) userStats.totalDone -= 1;
                // deduct XP (15XP)
                userStats.xp = Math.max(0, userStats.xp - 15);
                saveStats();
                updateHeaderAndProfile();
            }

            saveLogs();
            recalculateStreak();
            renderRoutines();
            renderProgressCircle();
            renderWeeklyChart();
        }

        // Streak check algorithm
        function recalculateStreak() {
            let currentStreak = 0;
            const checkDate = new Date();
            checkDate.setDate(checkDate.getDate() + customDateOffset);
            
            // Check consecutive days starting today or yesterday
            let streakActive = true;
            let daysBack = 0;
            
            // Helper to check if any routine was completed on a target date
            const hasActivity = (dateStr, dateObj) => {
                const logs = completedLogs[dateStr] || [];
                if (logs.length === 0) return false;
                
                // Make sure at least one completed routine is scheduled on that day
                const dayIndex = dateObj.getDay();
                const scheduledRoutines = routines.filter(r => r.days.includes(dayIndex));
                return scheduledRoutines.some(r => logs.includes(r.id));
            };

            // Start check
            let todayStr = getTodayString();
            let yesterday = new Date();
            yesterday.setDate(yesterday.getDate() + customDateOffset - 1);
            let yesterdayStr = getFormattedDateString(yesterday);

            let hasToday = hasActivity(todayStr, checkDate);
            let hasYesterday = hasActivity(yesterdayStr, yesterday);

            if (!hasToday && !hasYesterday) {
                userStats.streak = 0;
                saveStats();
                return;
            }

            let startFrom = hasToday ? 0 : 1;
            let consecutive = 0;

            while (streakActive) {
                const targetD = new Date();
                targetD.setDate(targetD.getDate() + customDateOffset - startFrom - consecutive);
                const targetStr = getFormattedDateString(targetD);
                
                // Does this day have routines scheduled? If not, we skip it without breaking streak!
                const dayIndex = targetD.getDay();
                const scheduled = routines.filter(r => r.days.includes(dayIndex));
                
                if (scheduled.length === 0) {
                    consecutive++;
                    continue; // Skip rest day
                }

                if (hasActivity(targetStr, targetD)) {
                    consecutive++;
                } else {
                    streakActive = false;
                }
            }

            userStats.streak = consecutive;
            if (userStats.streak > userStats.bestStreak) {
                userStats.bestStreak = userStats.streak;
            }
            saveStats();
        }

        function openEditRoutineModal(id) {
            const routine = routines.find(r => r.id === id);
            if (!routine) return;

            document.getElementById('modal-title').innerText = '루틴 수정하기';
            document.getElementById('edit-routine-id').value = routine.id;
            document.getElementById('habit-title').value = routine.title;
            document.getElementById('habit-category').value = routine.category;
            
            // Emoji setup
            document.querySelectorAll('#emoji-picker .emoji-btn').forEach(b => b.classList.remove('selected'));
            const customEmojiBtn = document.querySelector(`#emoji-picker .emoji-btn[data-emoji="${routine.emoji}"]`);
            if (customEmojiBtn) {
                customEmojiBtn.classList.add('selected');
            }
            selectedEmoji = routine.emoji;

            document.getElementById('habit-time').value = routine.time;
            
            // Frequency setup
            if (routine.frequency) {
                freqPreset.value = routine.frequency;
            } else {
                // Infer
                const isDaily = routine.days.length === 7;
                const isWeekdays = routine.days.length === 5 && !routine.days.includes(0) && !routine.days.includes(6);
                const isWeekends = routine.days.length === 2 && routine.days.includes(0) && routine.days.includes(6);
                
                if (isDaily) freqPreset.value = 'daily';
                else if (isWeekdays) freqPreset.value = 'weekdays';
                else if (isWeekends) freqPreset.value = 'weekends';
                else freqPreset.value = 'custom';
            }

            if (freqPreset.value === 'custom') {
                customDaysBox.style.display = 'block';
            } else {
                customDaysBox.style.display = 'none';
            }

            setSelectedDaysUI(routine.days);
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Save new / modified routine
        document.getElementById('modal-submit-btn').addEventListener('click', () => {
            const title = document.getElementById('habit-title').value.trim();
            const category = document.getElementById('habit-category').value;
            const time = document.getElementById('habit-time').value;
            const freq = freqPreset.value;
            const days = getSelectedDays();
            const editId = document.getElementById('edit-routine-id').value;

            if (!title) {
                alert('루틴 제목을 입력해주세요.');
                return;
            }

            if (days.length === 0) {
                alert('최소 하루 이상의 요일을 선택하셔야 합니다.');
                return;
            }

            if (editId) {
                // Update
                const rIndex = routines.findIndex(r => r.id === editId);
                if (rIndex > -1) {
                    routines[rIndex] = {
                        ...routines[rIndex],
                        title,
                        category,
                        emoji: selectedEmoji,
                        time,
                        frequency: freq,
                        days
                    };
                }
                showToast('루틴이 수정되었습니다.');
            } else {
                // Create
                const newRoutine = {
                    id: Date.now().toString(),
                    title,
                    category,
                    emoji: selectedEmoji,
                    time,
                    frequency: freq,
                    days
                };
                routines.push(newRoutine);
                showToast('새로운 루틴이 등록되었습니다.');
            }

            saveRoutines();
            closeModal();
            recalculateStreak();
            renderRoutines();
            updateHeaderAndProfile();
        });

        // Filter tab switching logic
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.getAttribute('data-filter');
                renderRoutines();
            });
        });

        // Theme Switcher Logic
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        themeToggleBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            themeToggleBtn.innerText = newTheme === 'dark' ? '🌙' : '☀️';
            
            localStorage.setItem('theme', newTheme);
        });

        // Load Theme from local storage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeToggleBtn.innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        }

        // Level Up confirmation click handler
        document.getElementById('levelup-confirm-btn').addEventListener('click', () => {
            document.getElementById('levelup-modal').classList.remove('active');
        });

        // Developer mode controls toggler and features
        const devBtn = document.getElementById('dev-drawer-btn');
        const devDrawer = document.getElementById('dev-drawer');
        devBtn.addEventListener('click', () => {
            devDrawer.classList.toggle('active');
        });

        document.getElementById('dev-btn-reset').addEventListener('click', () => {
            if (confirm('모든 데이터를 초기화하고 기본 세팅으로 돌아갑니까?')) {
                localStorage.clear();
                window.location.reload();
            }
        });

        // Inject 7 days of realistic completed statistics for test visuals
        document.getElementById('dev-btn-mock').addEventListener('click', () => {
            completedLogs = {};
            const mockDate = new Date();
            mockDate.setDate(mockDate.getDate() + customDateOffset);
            
            // Loop past 7 days
            for(let i=0; i<7; i++) {
                const day = new Date(mockDate);
                day.setDate(mockDate.getDate() - i);
                const dayStr = getFormattedDateString(day);
                
                // Add some completed routines
                const dayOfWeek = day.getDay();
                const dayRoutines = routines.filter(r => r.days.includes(dayOfWeek));
                
                // Check off a random subset of routines
                const countToCheck = Math.floor(Math.random() * (dayRoutines.length + 1));
                completedLogs[dayStr] = [];
                for(let j=0; j<countToCheck; j++) {
                    completedLogs[dayStr].push(dayRoutines[j].id);
                }
            }

            userStats.totalDone = Object.values(completedLogs).reduce((acc, currentList) => acc + currentList.length, 0);
            userStats.bestStreak = 7;
            userStats.streak = 5;
            userStats.level = 3;
            userStats.xp = 80;
            
            saveLogs();
            saveStats();
            showToast('테스트 데이터가 로드되었습니다.');
            updateHeaderAndProfile();
            renderRoutines();
        });

        document.getElementById('dev-btn-day-forward').addEventListener('click', () => {
            customDateOffset += 1;
            localStorage.setItem('customDateOffset', customDateOffset);
            
            showToast('날짜가 하루 경과되었습니다 (+1일)');
            recalculateStreak();
            updateHeaderAndProfile();
            renderRoutines();
        });

        document.getElementById('dev-btn-xp').addEventListener('click', () => {
            addXP(50);
        });

        // Initialize Application
        loadData();
        recalculateStreak();
        updateHeaderAndProfile();
        renderRoutines();
    </script>
</body>
</html>
